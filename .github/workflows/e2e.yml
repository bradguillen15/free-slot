name: E2E (deploy gate)

# Guest E2E is expensive to run on every PR commit, so it runs at deploy time
# (on merge to main) and on manual dispatch. PRs are covered by the cheaper
# checks in ci.yml plus the local pre-push hook (.githooks/pre-push).
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache the Playwright browser binaries, keyed by the resolved version
      # in the lockfile so the cache invalidates when @playwright/test updates.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      # The guest E2E suite boots the app in `e2e` mode (placeholder .env.e2e),
      # so no real Supabase project is needed.
      - name: Run guest E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

name: CD

# CD runs on every merge to main. It first re-runs the full CI suite (verify +
# E2E) via the reusable ci.yml workflow, then pushes Supabase migrations and
# edge functions, then deploys the frontend to Vercel — but only if CI passes.
# This makes a green E2E run a hard prerequisite for every deploy, independent
# of branch protection.
permissions:
  contents: read

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  supabase:
    needs: ci
    runs-on: ubuntu-latest
    # SUPABASE_ACCESS_TOKEN — personal access token from supabase.com/dashboard/account/tokens
    # SUPABASE_DB_PASSWORD — database password set when the project was created
    # SUPABASE_PROJECT_ID — project ref slug (same value as VITE_SUPABASE_PROJECT_ID)
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      # config.toml references env(OPENAI_API_KEY) for local Studio; not used in CI.
      OPENAI_API_KEY: dummy
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"

  deploy:
    needs: [ci, supabase]
    runs-on: ubuntu-latest
    # ORG/PROJECT ids tell the Vercel CLI which project to deploy; the token
    # authenticates it. All three are stored as repo secrets.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # `vercel build` detects pnpm-lock.yaml and shells out to pnpm to install
      # dependencies, so pnpm (and a matching Node) must be on PATH. Pin the same
      # pnpm major as ci.yml/e2e.yml to keep the deploy build consistent with CI.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull the project's production env (incl. VITE_SUPABASE_* vars) from
      # Vercel so the build matches a normal Vercel production build.
      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
